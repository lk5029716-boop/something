name: Build LimoGram

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Debug APK
        run: cd TMessagesProj && chmod +x gradlew && ./gradlew assembleDebug --no-daemon -x lint 2>&1 | tail -50
