name: Build LimoGram

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon -x lint 2>&1 | tail -80

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: TMessagesProj/build/outputs/apk/debug/*.apk
