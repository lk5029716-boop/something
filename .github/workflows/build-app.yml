name: Build LimoGram

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    timeout: 600

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Debug APK
        run: cd TMessagesProj && chmod +x gradlew && ./gradlew assembleDebug --no-daemon -x lint 2>&1 | tail -50

      - name: Upload to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:1024137757069:android:3459ad6c648c53543c7dc4
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: TMessagesProj/build/outputs/apk/debug/app-debug.apk
