name: Build LimoGram APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'README*'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.2.12479018"

      - name: Setup ccache
        run: |
          sudo apt-get update && sudo apt-get install -y ccache
          mkdir -p /home/runner/.ccache
          ccache --max-size=5G
          echo "CCACHE_DIR=/home/runner/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_COMPRESSLEVEL=6" >> $GITHUB_ENV
          echo "NDK_CCACHE=ccache" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: CCACHE_DIR=/home/runner/.ccache ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone --parallel --max-workers=4

      - name: Show ccache statistics
        run: ccache --show-stats

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimoGram-APK
          path: TMessagesProj_AppStandalone/build/outputs/apk/afat/standalone/*.apk

      - name: Upload to Firebase App Distribution
        if: success()
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:1024137757069:android:3459ad6c648c53543c7dc4
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          file: TMessagesProj_AppStandalone/build/outputs/apk/afat/standalone/app.apk
