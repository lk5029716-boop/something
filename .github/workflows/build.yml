name: Build LimoGram APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'README*'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: $ANDROID_HOME/ndk/27.2.12479018
          key: ${{ runner.os }}-ndk-27.2.12479018

      - name: Install NDK (if not cached)
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/27.2.12479018" ]; then
            sdkmanager --install "ndk;27.2.12479018"
          fi

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-ccache-
          fail-on-cache-miss: false

      - name: Restore Gradle cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'TMessagesProj_AppStandalone/build.gradle', 'TMessagesProj/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
          fail-on-cache-miss: false

      - name: Setup ccache
        run: |
          sudo apt-get update && sudo apt-get install -y ccache
          mkdir -p /home/runner/.ccache
          ccache --max-size=5G
          echo "CCACHE_DIR=/home/runner/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_COMPRESSLEVEL=6" >> $GITHUB_ENV
          echo "NDK_CCACHE=ccache" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone --parallel --max-workers=4 --build-cache --configure-on-demand

      - name: Show ccache statistics
        run: ccache --show-stats

      - name: Save ccache
        uses: actions/cache/save@v4
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}

      - name: Save Gradle cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'TMessagesProj_AppStandalone/build.gradle', 'TMessagesProj/build.gradle') }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimoGram-APK
          path: TMessagesProj_AppStandalone/build/outputs/apk/afat/standalone/*.apk

      - name: Upload to Firebase App Distribution
        if: success()
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:1024137757069:android:3459ad6c648c53543c7dc4
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          file: TMessagesProj_AppStandalone/build/outputs/apk/afat/standalone/app.apk
