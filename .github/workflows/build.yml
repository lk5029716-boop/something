name: Build LimoGram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.2.12479018"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimoGram-APK
          path: TMessagesProj_AppStandalone/build/outputs/apk/afat/standalone/*.apk