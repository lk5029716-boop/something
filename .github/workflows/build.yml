name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout: 600
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
    - uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27c
    
    - name: Build Debug
      run: ./gradlew assembleDebug --no-daemon 2>&1 | tail -30
      env:
        GRADLE_OPTS: "-Xmx4096m"
    
    - name: Upload APK
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: 1:1024137757069:android:3459ad6c648c53543c7dc4
        serviceCredentialsFileContent: \${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        groups: testers
        file: TMessagesProj/build/outputs/apk/debug/app-debug.apk
