name: Build LimoGram APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'README*'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_COMPRESS: 1
  CCACHE_COMPRESSLEVEL: 6
  CCACHE_SLOPPINESS: include_file_mtime,include_file_ctime,time_macros,file_macro,system_headers
  CCACHE_BASEDIR: ${{ github.workspace }}
  NDK_CCACHE: ccache
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=8 -Dorg.gradle.configureondemand=true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Cache NDK
        uses: actions/cache@v3
        with:
          path: $ANDROID_HOME/ndk/27.2.12479018
          key: ${{ runner.os }}-ndk-27.2.12479018

      - name: Install NDK if missing
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/27.2.12479018" ]; then
            sdkmanager --install "ndk;27.2.12479018"
          fi

      - name: Cache ccache
        uses: actions/cache@v3
        with:
          path: /home/runner/.ccache
          key: Linux-ccache
          restore-keys: |
            Linux-ccache

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle
          restore-keys: |
            ${{ runner.os }}-gradle

      - name: Setup ccache
        run: |
          sudo apt-get update && sudo apt-get install -y ccache
          mkdir -p /home/runner/.ccache
          ccache --max-size=5G

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone --parallel --max-workers=4

      - name: Show ccache statistics
        run: ccache --show-stats

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimoGram-APK
          path: TMessagesProj_AppStandalone/build/outputs/apk/afat/standalone/*.apk

      - name: Upload to Firebase App Distribution
        if: success()
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:1024137757069:android:3459ad6c648c53543c7dc4
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          file: TMessagesProj_AppStandalone/build/outputs/apk/afat/standalone/app.apk
