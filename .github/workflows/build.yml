name: Build LimoGram

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout: 600
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27c
    
    - name: Copy google-services.json
      run: |
        cp TMessagesProj/google-services.json TMessagesProj/google-services.json.bak 2>/dev/null || true
    
    - name: Build Debug APK
      run: |
        cd TMessagesProj && ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
      env:
        GRADLE_OPTS: "-Xmx4096m"
    
    - name: Build Standalone APK
      run: |
        cd TMessagesProj_AppStandalone && ./gradlew assembleStandalone --no-daemon 2>&1 | tail -20
      env:
        GRADLE_OPTS: "-Xmx4096m"
    
    - name: Upload to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: 1:1024137757069:android:3459ad6c648c53543c7dc4
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        groups: testers
        file: TMessagesProj_AppStandalone/build/outputs/apk/standalone/app.apk
